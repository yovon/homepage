<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ .Title }} · {{ site.Title }}</title>
  {{- with (.Description | default site.Params.description) }}
  <meta name="description" content="{{ . }}">
  {{- end }}
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; }
    .whist-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
    .whist-back {
      position: fixed; top: 10px; left: 10px; z-index: 10;
      font: 14px/1 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: rgba(0,0,0,0.6); color: #fff; text-decoration: none;
      padding: 7px 11px; border-radius: 6px;
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    }
    .whist-back:hover { background: rgba(0,0,0,0.85); }
  </style>
</head>
<body>
  <a class="whist-back" href="{{ "/projects/" | relLangURL }}">← Back to projects</a>
  <iframe class="whist-frame" src="https://yovon.github.io/whist-web/"
          title="{{ .Title }}" allow="fullscreen"></iframe>
</body>
</html>
