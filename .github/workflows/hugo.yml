# Builds the Hugo site on GitHub's servers and deploys to GitHub Pages.
# You only need Hugo locally for previews — this runner handles production builds.
# Based on Hugo's official GitHub Pages workflow.
name: Deploy Hugo site to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

# Allow the workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys
concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3      # keep in sync with your local `hugo version`
      HUGO_ENVIRONMENT: production
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # REQUIRED: PaperMod is a git submodule
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          # The Actions runner overrides baseURL so links/CSS resolve correctly,
          # whether served from username.github.io/repo/ or a custom domain.
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${HUGO_BASEURL}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
