# =============================================================================
# Hugo configuration — Yoav Ziv, academic personal site (PaperMod theme)
# =============================================================================
# baseURL must match where the site is served, or CSS/links break.
# The GitHub Actions deploy auto-overrides this with the real Pages URL,
# so this value mainly matters for local correctness.

baseURL = 'https://yovon.github.io/homepage/'   # TODO: change 'homepage' if you name the repo differently; swap to custom domain later.
locale = 'en-us'
title = 'Yoav Ziv'
theme = 'PaperMod'

enableRobotsTXT = true
enableEmoji = true
canonifyURLs = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

# ----------------------------------------------------------------------------
# Top navigation menu
# ----------------------------------------------------------------------------
[menu]
  [[menu.main]]
    identifier = 'publications'
    name = 'Publications'
    url = '/publications/'
    weight = 10
  [[menu.main]]
    identifier = 'projects'
    name = 'Projects'
    url = '/projects/'
    weight = 20
  [[menu.main]]
    identifier = 'cv'
    name = 'CV'
    url = '/cv/'
    weight = 30

# ----------------------------------------------------------------------------
# Theme parameters
# ----------------------------------------------------------------------------
[params]
  env = 'production'
  description = 'PhD student in astrophysics at Tel Aviv University studying white dwarfs, population synthesis, and double-white-dwarf systems.'
  author = 'Yoav Ziv'
  defaultTheme = 'auto'        # auto | light | dark
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = false
  disableScrollToTop = false
  hidemeta = false
  ShowWordCount = false
  # The landing page renders content/_index.md (classic academic layout:
  # headshot + bio + contact line), not PaperMod's centered "profile mode".

  [params.assets]
    disableHLJS = true
    # favicon = '/favicon.ico'   # add static/favicon.ico to enable

# ----------------------------------------------------------------------------
# Markdown rendering — allow raw HTML in markdown where needed
# (headshot layout on the home page; the <iframe> on the Projects page).
# ----------------------------------------------------------------------------
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
